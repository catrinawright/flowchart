/* ── HELPERS ─────────────────────────────────────────────────────────────── */
const frameworkColors = {'CCSS':'bg-indigo-100 text-indigo-800 border-indigo-300','DLM EE':'bg-teal-100 text-teal-800 border-teal-300','IL SEL':'bg-emerald-100 text-emerald-800 border-emerald-300','IDEA Transition ⓘ':'bg-amber-100 text-amber-800 border-amber-300'};

const formatSubjectText = std => {
  if (!std) return 'grade-level';
  if (std.grade === 'Transition') return `transition-level ${std.subject}`;
  if (std.grade === 'All Grades') return std.subject;
  const prefix = std.grade.includes('-') ? `Grades ${std.grade}` : `Grade ${std.grade}`;
  return `${prefix} ${std.subject}`;
};

const detectSubjectCategory = std => {
  if (!std) return 'General';
  const s = std.subject.toLowerCase(), id = std.id.toLowerCase();
  if (s.includes('literature')||s.includes('reading')||s.includes('writing')||s.includes('informational')||s.includes('speaking')||s.includes('language')||id.startsWith('rl')||id.startsWith('ri')||id.startsWith('w.')||id.startsWith('sl')||id.startsWith('l.')||id.startsWith('ee.r')||id.startsWith('ee.w')||id.startsWith('ee.s')||id.startsWith('ee.l')) return 'ELA';
  if (s.includes('math')||id.includes('n-q')||id.includes('n-cn')||id.includes('a-ss')||id.includes('a-ce')||id.includes('a-re')||id.includes('f-if')||id.includes('f-bf')||id.includes('f-le')||id.includes('s-id')||id.includes('s-ic')||id.startsWith('ee.n')||id.startsWith('ee.a')||id.startsWith('ee.f')||id.startsWith('ee.s')||id.startsWith('hs')) return 'Math';
  if (std.grade==='Transition'||s.includes('living')||s.includes('vocational')||s.includes('community')||s.includes('advocacy')||s.includes('employment')||s.includes('postsecondary')||id.startsWith('idea')) return 'Transition';
  return 'General';
};

const generateGoal = (std, levelId, at, rm, sd, dm) => {
  const subject = formatSubjectText(std);
  const atText   = at ? at.goalText : 'adapted materials and assistive technology';
  const respText = rm ? rm.goalResponse : 'using an appropriate response mode';
  const dataText = dm ? dm.goalMeasure : 'in 4 out of 5 opportunities by [Date]';
  const skill    = std ? std.skill : 'the target concept';
  const sdClause = sd ? `, while ${sd.goalExpansion},` : '';
  if (levelId==='beginning') return `Using ${atText} and tactile objects of reference corresponding to the ${subject} unit${sdClause} [Student Name] will actively participate in exploring ${skill} by ${respText} ${dataText}.`;
  if (levelId==='concrete')  return `Using ${atText} and adapted, visually-supported ${subject} materials${sdClause} [Student Name] will independently demonstrate understanding of ${skill} by ${respText} ${dataText}.`;
  return `Using ${atText} and structurally adapted ${subject} materials with embedded prompts and definitions${sdClause} [Student Name] will independently apply skills regarding ${skill} by ${respText} ${dataText}.`;
};

                  </div>
                  <div className={`p-3 ${selSD.bg} border-2 ${selSD.border} rounded-xl`}>
                    <p className={`text-xs font-bold mb-1 ${selSD.text}`}>{selSD.expansionLabel} — Expanded Objective</p>
                    <p className="text-sm text-slate-800 leading-relaxed italic">{sdGoal}</p>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* PHASE 4 — RESPONSE MODE */}
          <div className="p-5 border-b border-slate-100">
            <div className="flex items-center gap-2 mb-3">
              <div className={`p-2 rounded-lg ${cur.bg}`}><Hand className={cur.text} size={18}/></div>
              <div>
                <h4 className={`font-bold ${cur.text}`}>Phase 4 — Response Mode</h4>
                <p className="text-xs text-slate-500">Chapter 3: Five-level hierarchy ordered by degree of support. Select the mode the student can perform reliably.</p>
              </div>
            </div>
            <div className="space-y-2">
              {responseModes.map(rm=>{
                const Ic=rm.icon; const isSel=selRM?.level===rm.level;
                return(
                  <button key={rm.level} onClick={()=>setSelRM(isSel?null:rm)}
                    className={`w-full text-left p-3 rounded-xl border-2 transition-all card-hover ${isSel?`${rm.border} ${rm.bg} shadow-md`:'border-slate-200 bg-slate-50 hover:border-slate-300'}`}>
                    <div className="flex items-start gap-3">
                      <div className={`p-2 rounded-lg shrink-0 mt-0.5 ${isSel?rm.bg:'bg-white'} border ${isSel?rm.border:'border-slate-200'}`}>
                        <Ic size={14} className={isSel?rm.text:'text-slate-500'}/>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-1">
                          <span className={`font-bold text-sm ${isSel?rm.text:'text-slate-700'}`}>Level {rm.level} — {rm.name}</span>
                          <span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${isSel?`${rm.bg} ${rm.text} border-current`:'bg-slate-100 text-slate-500 border-slate-200'}`}>{rm.support}</span>
                          {isSel&&<CheckCircle2 size={14} className={rm.text}/>}
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed mb-1">{rm.description}</p>
                        {isSel&&<p className={`text-xs font-medium leading-relaxed ${rm.text}`}><strong>Data collection note:</strong> {rm.dataNote}</p>}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* PHASE 5 — DATA + SMART GOAL */}
          <div className="p-5">
            <div className="mb-5">
              <div className="flex items-center gap-2 mb-3">
                <div className={`p-2 rounded-lg ${cur.bg}`}><BarChart2 className={cur.text} size={18}/></div>
                <div>
                  <h4 className={`font-bold ${cur.text}`}>Phase 5a — Data Collection Method</h4>
                  <p className="text-xs text-slate-500">Chapter 1: IEP objectives specify not just the performance criterion but the observational context.</p>
                </div>
              </div>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">
                {dataCollectionMethods.map(dm=>{
                  const Ic=dm.icon; const isSel=selDM?.id===dm.id; const isRec=dm.id===dmForLvl;
                  return(
                    <button key={dm.id} onClick={()=>setSelDM(isSel?null:dm)}
                      className={`text-left p-3 rounded-xl border-2 transition-all card-hover ${isSel?`${dm.border} ${dm.bg} shadow-md`:'border-slate-200 bg-slate-50 hover:border-slate-300'}`}>
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-2">
                          <Ic size={13} className={isSel?dm.text:'text-slate-400'}/>
                          <span className={`font-bold text-xs ${isSel?dm.text:'text-slate-700'}`}>{dm.name}</span>
                        </div>
                        {isRec&&!isSel&&<span className="text-xs bg-yellow-100 text-yellow-800 px-1.5 py-0.5 rounded border border-yellow-200 font-medium">Suggested</span>}
                        {isSel&&<CheckCircle2 size={13} className={dm.text}/>}
                      </div>
                      <p className="text-xs text-slate-500 leading-relaxed">{dm.description}</p>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* SMART GOAL OUTPUT */}
            <div className={`relative p-5 rounded-2xl border-2 ${cur.border} bg-white shadow-sm ${selectedStd?'ring-4 ring-yellow-200 ring-offset-2':''}`}>
              <div className={`absolute -top-3 left-5 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-white shadow ${cur.accent}`}>
                Phase 5b — Generated SMART Goal
              </div>
              <p className="text-base font-medium text-slate-800 leading-relaxed mt-1 mb-4">{goal}</p>
              <div className="flex flex-wrap gap-2">
                {[
                  {label:'S',value:selectedStd?selectedStd.skill:'Active engagement'},
                  {label:'M',value:selDM?selDM.badge:'Select data method above'},
                  {label:'A',value:selAT?selAT.name:'AT not specified'},
                  {label:'R',value:selectedStd?`${selectedStd.id} (${selectedStd.framework})`:'No standard selected'},
                  {label:'T',value:'[Date]'},
                ].map(({label,value})=>(
                  <span key={label} className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs border font-medium ${
                    label==='R'&&selectedStd?'bg-yellow-100 text-yellow-800 border-yellow-300':
                    label==='A'&&selAT?`${cur.bg} ${cur.text} ${cur.border}`:
                    label==='M'&&selDM?`${selDM.bg} ${selDM.text} ${selDM.border}`:
                    'bg-slate-100 text-slate-600 border-slate-200'
                  }`}><strong>{label}:</strong> {value}</span>
                ))}
              </div>
            </div>

            {/* COMPARE ALL PROFILES */}
            <div className="mt-4">
              <button onClick={()=>setShowCompare(v=>!v)} disabled={!selectedStd}
                className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 font-bold text-sm transition-all ${selectedStd?'border-slate-300 bg-slate-50 hover:bg-slate-100 text-slate-700':'border-slate-200 bg-slate-50 text-slate-300 cursor-not-allowed'}`}>
                <LayoutGrid size={16}/>
                {showCompare?'Hide':'Compare All Three Symbol Level Goals'}
                {!selectedStd&&<span className="text-xs font-normal">(select a standard first)</span>}
                {showCompare?<ChevronUp size={14}/>:<ChevronDown size={14}/>}
              </button>
              {showCompare&&selectedStd&&(
                <div className="mt-4 grid md:grid-cols-3 gap-4 fade-in">
                  {Object.values(symbolProfiles).map(profile=>{
                    const g = generateGoal(selectedStd,profile.id,selAT,selRM,selSD,selDM);
                    const Ic = profile.icon;
                    return(
                      <div key={profile.id} className={`p-4 rounded-xl border-t-4 ${profile.border} bg-white shadow-sm`}>
                        <div className="flex items-center gap-2 mb-2">
                          <Ic size={15} className={profile.text}/>
                          <p className={`font-bold text-sm ${profile.text}`}>{profile.title}</p>
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed">{g}</p>
                        <div className="mt-2 pt-2 border-t border-slate-100">
                          <p className={`text-xs font-medium ${profile.text}`}>Default response mode:</p>
                          <p className="text-xs text-slate-500">{profile.id==='beginning'?'Level 5 — Switch Activation':profile.id==='concrete'?'Level 2-3 — Pointing or Velcro Pull':'Level 1 — Verbal or Text Selection'}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>

        <p className="text-center text-xs text-slate-400 pb-4">
          Based on Browder et al. — Chapters 1 (Symbol User Framework), 2 (Self-Determination), and 3 (AT and Adaptation) · {standardsDB.length} standards across CCSS ELA 11-12, CCSS Math HS, DLM EEs 11-12, Illinois SEL, and IDEA Transition
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
